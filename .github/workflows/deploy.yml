name: Build and Deploy

on:
  # Auto-deploy on push to main is disabled; trigger manually instead.
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: fulcrum-chat

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets and variables
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
        run: |
          missing=()
          for key in AZURE_CREDENTIALS PROJECT_NAME AZURE_ACR_LOGIN_SERVER; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets/variables: ${missing[*]}"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: check-secrets
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${AZURE_ACR_LOGIN_SERVER%.azurecr.io}
        env:
          AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}

      - name: Build and push
        id: build
        env:
          ACR_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${ACR_SERVER}/${IMAGE_NAME}:${SHA}"
          IMAGE_LATEST="${ACR_SERVER}/${IMAGE_NAME}:latest"
          docker build -t "${IMAGE}" -t "${IMAGE_LATEST}" .
          docker push "${IMAGE}"
          docker push "${IMAGE_LATEST}"
          echo "image_tag=${IMAGE}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          echo "Deploying image: ${IMAGE_TAG}"
          az containerapp update \
            --name "ca-fulcrum-${PROJECT_NAME}-chat" \
            --resource-group "rg-fulcrum-${PROJECT_NAME}" \
            --image "${IMAGE_TAG}"
